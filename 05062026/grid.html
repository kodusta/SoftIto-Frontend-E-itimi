<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basit Grid Gösterimi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8 flex flex-col items-center">
  <div class="max-w-2xl w-full bg-white p-6 rounded shadow">
    <h1 class="text-xl font-bold mb-4">Tailwind Grid (Responsive)</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-indigo-100 border border-indigo-200 p-4 rounded text-center">
        <h3 class="font-bold text-indigo-700">Kart 1</h3>
        <p class="text-xs text-indigo-600 mt-1">Mobilde alt alta, geniş ekranda yan yana.</p>
      </div>
      <div class="bg-purple-100 border border-purple-200 p-4 rounded text-center">
        <h3 class="font-bold text-purple-700">Kart 2</h3>
        <p class="text-xs text-purple-600 mt-1">Mobilde alt alta, geniş ekranda yan yana.</p>
      </div>
      <div class="bg-pink-100 border border-pink-200 p-4 rounded text-center">
        <h3 class="font-bold text-pink-700">Kart 3</h3>
        <p class="text-xs text-pink-600 mt-1">Mobilde alt alta, geniş ekranda yan yana.</p>
      </div>
    </div>
  </div>
</body>
</html>
