<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basit Landing Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
  <nav class="bg-slate-800 p-4 flex justify-between">
    <div class="font-bold text-blue-400">Selahaddin ÇİFTÇİ</div>
    <div class="flex gap-4">
      <a href="#" class="hover:text-blue-400">Ana Sayfa</a>
      <a href="#" class="hover:text-blue-400">Hizmetler</a>
      <a href="#" class="hover:text-blue-400">İletişim</a>
    </div>
  </nav>

  <section class="text-center py-16 px-4">
    <h1 class="text-3xl font-bold mb-2">Geleceğin Teknolojisi</h1>
    <p class="text-slate-400 mb-6 max-w-md mx-auto">
      Tailwind CSS kullanarak hızlı ve kolay web sayfaları geliştirin.
    </p>
    <button class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded">
      Başlayın
    </button>
  </section>

  <section class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-4 pb-16 px-4">
    <div class="bg-slate-800 p-4 rounded">
      <h3 class="font-bold mb-1 text-blue-300">Kolay Tasarım</h3>
      <p class="text-slate-450 text-sm">HTML içinde sınıfları kullanarak sayfayı şekillendirin.</p>
    </div>
    <div class="bg-slate-800 p-4 rounded">
      <h3 class="font-bold mb-1 text-blue-300">Hızlı Kodlama</h3>
      <p class="text-slate-450 text-sm">CSS dosyası yazmadan arayüz tasarlayın.</p>
    </div>
  </section>
</body>
</html>
