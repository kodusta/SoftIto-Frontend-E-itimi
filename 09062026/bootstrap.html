<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Paneli</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="d-flex">
    
    <div class="offcanvas-lg offcanvas-start bg-dark text-white min-vh-100 p-3" id="sidebar" style="width: 250px; flex-shrink: 0;">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <h5 class="fw-bold mb-0 text-primary"><i class="bi bi-speedometer2 me-2"></i>Admin Panel</h5>
        <button type="button" class="btn-close btn-close-white d-lg-none" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button>
      </div>
      
      <div class="list-group list-group-flush">
        <div class="list-group-item bg-transparent text-white border-0 py-2 px-0"><i class="bi bi-box-seam me-2"></i>Ürünler</div>
        <div class="list-group-item bg-transparent text-white border-0 py-2 px-0"><i class="bi bi-people me-2"></i>Kullanıcılar</div>
        <div class="list-group-item bg-transparent text-white border-0 py-2 px-0"><i class="bi bi-cart3 me-2"></i>Siparişler</div>
        <div class="list-group-item bg-transparent text-white border-0 py-2 px-0"><i class="bi bi-graph-up me-2"></i>Raporlar</div>
        <div class="list-group-item bg-transparent text-white border-0 py-2 px-0"><i class="bi bi-gear me-2"></i>Ayarlar</div>
      </div>
    </div>

    <div class="flex-grow-1 min-vh-100 d-flex flex-column" style="overflow-x: hidden;">
      
      <header class="navbar navbar-expand navbar-light bg-white border-bottom px-3 py-2 shadow-sm">
        <button class="btn btn-outline-dark d-lg-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
          <i class="bi bi-list"></i>
        </button>
        <span class="navbar-brand fw-bold mb-0">Yönetim Paneli</span>
      </header>

      <main class="container-fluid p-4">
        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <div class="card p-3 shadow-sm border-0 bg-primary text-white text-center">
              <div class="small">Toplam Ürün</div>
              <h4 class="fw-bold mb-0">1,240</h4>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card p-3 shadow-sm border-0 bg-success text-white text-center">
              <div class="small">Kullanıcılar</div>
              <h4 class="fw-bold mb-0">320</h4>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card p-3 shadow-sm border-0 bg-warning text-dark text-center">
              <div class="small">Siparişler</div>
              <h4 class="fw-bold mb-0">45</h4>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card p-3 shadow-sm border-0 bg-danger text-white text-center">
              <div class="small">Aylık Ciro</div>
              <h4 class="fw-bold mb-0">78,500 ₺</h4>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0 p-3 mb-4">
          <h5 class="fw-bold mb-3 small text-uppercase text-muted">Son Eklenen Ürünler</h5>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-sm">
              <thead class="table-light">
                <tr>
                  <th>Ürün Adı</th>
                  <th>Kategori</th>
                  <th>Fiyat</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Akıllı Saat</td>
                  <td>Elektronik</td>
                  <td>4,500 ₺</td>
                </tr>
                <tr>
                  <td>Kablosuz Kulaklık</td>
                  <td>Elektronik</td>
                  <td>2,200 ₺</td>
                </tr>
                <tr>
                  <td>Sırt Çantası</td>
                  <td>Aksesuar</td>
                  <td>850 ₺</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
